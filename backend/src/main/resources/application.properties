spring.datasource.url=jdbc:mysql://localhost:3306/dsa_easy
spring.datasource.username=dsa_user
spring.datasource.password=dsa_pass
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8085

app.jwt.secret=${APP_JWT_SECRET:replace-this-with-a-long-secret-key-for-local-dev-only-1234567890}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.ai.api-key=${AI_API_KEY:}
app.ai.api-url=${AI_API_URL:https://api.openai.com/v1/chat/completions}
app.ai.model=${AI_MODEL:gpt-4o-mini}